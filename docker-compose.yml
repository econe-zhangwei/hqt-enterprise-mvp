services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hqt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/hqt
      CORS_ALLOW_ORIGINS: "*"
      OPENAI_API_KEY: ""
      OPENAI_MODEL: "gpt-4o-mini"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
